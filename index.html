<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Bekkeblomveien i Palmanova</title>
  <meta name="description" content="Mobiltilpasset reiseapp med interaktivt kart over glutenfri mat, restauranter, sportspuber, aktiviteter, shopping, hotell og apotek i Palmanova." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root{
      --bg:#07111f;
      --panel:rgba(10,18,34,.82);
      --panel2:rgba(10,18,34,.94);
      --line:rgba(255,255,255,.12);
      --text:#f5f8fc;
      --muted:#b7c4d6;
      --sea:#4fd1ff;
      --green:#8ef0bd;
      --yellow:#ffcf5a;
      --red:#ff8a8a;
      --shadow:0 18px 48px rgba(0,0,0,.34);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.12), transparent 22%),
        linear-gradient(180deg, #08111f 0%, #0e2038 35%, #123d57 100%);
      min-height:100vh;
    }
    .hero{
      padding:12px 12px 10px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), transparent 35%),
        radial-gradient(circle at 15% 18%, rgba(255,220,120,.16), transparent 16%),
        radial-gradient(circle at 88% 20%, rgba(79,209,255,.12), transparent 18%);
    }
    .hero-inner{
      max-width:1200px;
      margin:0 auto;
    }
    .hero-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    h1{
      margin:0;
      font-size:clamp(1.35rem,4.2vw,2.0rem);
      line-height:1.05;
      letter-spacing:-.03em;
      white-space:nowrap;
    }
    .reise-btn{
      border:none;
      border-radius:999px;
      padding:8px 14px;
      background:rgba(79,209,255,.25);
      border:1px solid rgba(79,209,255,.55);
      color:var(--text);
      font-weight:700;
      font-size:.85rem;
      cursor:pointer;
      backdrop-filter: blur(12px);
    }
    .reise-btn:hover{background:rgba(79,209,255,.35)}
    .top-bar{
      margin-top:8px;
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .currency-box{
      flex:1;
      min-width:0;
      display:flex;
      align-items:center;
      gap:6px;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.10);
    }
    .currency-box label{
      font-size:.8rem;
      color:var(--muted);
      white-space:nowrap;
    }
    .currency-input{
      flex:0 0 70px;
      padding:6px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.45);
      color:var(--text);
      font-size:.8rem;
      outline:none;
    }
    .currency-output{
      font-size:.8rem;
      color:#e5f9ff;
      white-space:nowrap;
    }
    .emergency{
      flex:0 0 auto;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      font-size:.8rem;
      color:var(--muted);
      white-space:nowrap;
    }
    .emergency strong{color:#ffd166}

    .weather-top{
      margin-top:10px;
      padding:10px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
    }
    .weather-top h2{
      margin:0 0 8px;
      font-size:.98rem;
    }
    .weather-grid-top{
      display:grid;
      grid-template-columns:repeat(6, minmax(86px, 1fr));
      gap:8px;
      overflow:auto;
      padding-bottom:2px;
    }
    .day{
      min-width:86px;
      border-radius:14px;
      padding:9px;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.09);
    }
    .day .d{font-weight:800; margin-bottom:6px; font-size:.9rem}
    .day .t{color:var(--muted); font-size:.8rem; line-height:1.35}

    .layout{
      max-width:1200px;
      margin:0 auto;
      padding:12px;
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      align-items:start;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      backdrop-filter: blur(14px);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .sidebar{
      padding:10px;
    }
    .section-title{
      margin:4px 0 8px;
      font-size:1rem;
      letter-spacing:-.02em;
    }
    .filters{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:8px;
    }
    .chip{
      cursor:pointer;
      border:none;
      color:var(--text);
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      padding:8px 10px;
      border-radius:999px;
      font-weight:700;
      font-size:.82rem;
      transition:.15s transform, .15s background, .15s border-color;
    }
    .chip:hover{transform:translateY(-1px)}
    .chip.active{background:rgba(79,209,255,.20); border-color:rgba(79,209,255,.40)}
    .search{
      width:100%;
      margin:0 0 8px;
      padding:11px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.20);
      color:var(--text);
      outline:none;
      font-size:.95rem;
    }
    .search::placeholder{color:#8fa3bb}
    .list{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:55vh;
      overflow:auto;
      padding-right:3px;
    }
    .item{
      background:var(--panel2);
      border:1px solid rgba(255,255,255,.09);
      border-radius:16px;
      padding:11px;
      cursor:pointer;
      transition:.15s transform, .15s border-color;
    }
    .item:hover{transform:translateY(-1px); border-color:rgba(255,255,255,.18)}
    .item h3{margin:0 0 5px; font-size:.95rem}
    .meta{color:var(--muted); font-size:.84rem; line-height:1.4}
    .tags{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px}
    .tag{
      display:inline-block;
      padding:3px 8px;
      border-radius:999px;
      font-size:.72rem;
      font-weight:700;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
    }
    .tag.gf{background:rgba(142,240,189,.14)}
    .tag.rest{background:rgba(255,209,102,.14)}
    .tag.vm{background:rgba(255,138,138,.14)}
    .tag.shop{background:rgba(79,209,255,.14)}
    .tag.hotel{background:rgba(255,255,255,.10)}
    .tag.apotek{background:rgba(255,255,255,.14)}
    .map-wrap{padding:10px}
    #map{
      width:100%;
      height:55vh;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.1);
    }
    .footer-note{
      margin-top:10px;
      color:var(--muted);
      font-size:.8rem;
      line-height:1.4;
    }
    @media (min-width: 900px){
      .layout{
        grid-template-columns:380px 1fr;
      }
      .sidebar{
        position:sticky;
        top:12px;
      }
      #map{
        height:620px;
      }
      .list{
        max-height:620px;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-row">
        <h1>Bekkeblomveien i Palmanova</h1>
        <button class="reise-btn" onclick="window.location.href='reise.html'">Reise</button>
      </div>

      <div class="top-bar">
        <div class="currency-box">
          <label for="eurInput">Valuta: EUR → NOK</label>
          <input id="eurInput" class="currency-input" type="number" inputmode="decimal" placeholder="EUR" />
          <div class="currency-output" id="nokOutput">≈ 0 NOK</div>
        </div>
        <div class="emergency">
          <strong>Nød (+34):</strong> Brann 080 – Lege 061 – Politi 112
        </div>
      </div>

      <div class="weather-top">
        <h2>Værmelding 16.–21. juli</h2>
        <div class="weather-grid-top" id="weatherGridTop"></div>
      </div>
    </div>
  </header>

  <main class="layout">
    <aside class="panel sidebar">
      <h2 class="section-title">Filtrer innhold</h2>

      <div class="filters" id="mainFilters">
        <button class="chip active" data-filter="all">Alle</button>
        <button class="chip" data-filter="glutenfri">Glutenfri</button>
        <button class="chip" data-filter="restaurant">Restauranter</button>
        <button class="chip" data-filter="sportspub">Sportspuber</button>
        <button class="chip" data-filter="aktivitet">Aktiviteter</button>
        <button class="chip" data-filter="shopping">Shopping</button>
        <button class="chip" data-filter="hotell">Hotell</button>
        <button class="chip" data-filter="apotek">Apotek</button>
      </div>

      <div class="filters" id="activityFilters">
        <button class="chip" data-activity="shopping-palmanova">Shopping Palmanova</button>
        <button class="chip" data-activity="shopping-palma">Shopping Palma</button>
      </div>

      <input id="search" class="search" type="search" placeholder="Søk navn, gate eller aktivitet..." />

      <div class="list" id="list"></div>

      <div class="footer-note">
        Kartet er optimalisert for mobilbruk.
      </div>
    </aside>

    <section class="panel map-wrap">
      <div id="map"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const places = [
      // Glutenfri
      {id:1,type:"glutenfri",name:"St. Lorenzo Tapas",address:"Calle Marina / sidegate ved Palmanova",note:"100% glutenfri profil og sterk omtale.",lat:39.5153,lng:2.5338,activity:"mat"},
      {id:2,type:"glutenfri",name:"L.A. American Diner",address:"Passeig Mar, 18",note:"Godt kjent for glutenfrie valg.",lat:39.5157,lng:2.5372,activity:"mat"},
      {id:3,type:"glutenfri",name:"La Piazzetta",address:"Passeig Mar, 10",note:"Glutenfrie alternativer nær strandpromenaden.",lat:39.5154,lng:2.5365,activity:"mat"},
      {id:4,type:"glutenfri",name:"My Thai",address:"Passeig Mar, 12",note:"Glutenfrie valg i menyen.",lat:39.5155,lng:2.5368,activity:"mat"},
      {id:5,type:"glutenfri",name:"The Blue Bar",address:"Palmanova strandsonen",note:"Glutenfri mat, brød og pasta.",lat:39.5150,lng:2.5329,activity:"mat"},
      {id:6,type:"glutenfri",name:"Be Max Beach House",address:"Carrer Cala Blanca",note:"Strandnær restaurant med GF-alternativer.",lat:39.5149,lng:2.5327,activity:"mat"},
      {id:7,type:"glutenfri",name:"McDonald's",address:"Palmanova / nærområdet",note:"Kjeden med standardisert meny, flere steder i området.",lat:39.5152,lng:2.5355,activity:"mat"},

      // Restauranter
      {id:20,type:"restaurant",name:"Olive Tree",address:"Palmanova",note:"Middelhavsinspirert meny.",lat:39.5151,lng:2.5362,activity:"mat"},
      {id:21,type:"restaurant",name:"Iroko",address:"Palmanova",note:"Fusion og grill.",lat:39.5148,lng:2.5370,activity:"mat"},
      {id:22,type:"restaurant",name:"Max Garden",address:"Palmanova",note:"Moderne restaurant med vekt på matopplevelse.",lat:39.5156,lng:2.5368,activity:"mat"},
      {id:23,type:"restaurant",name:"Siso Beach",address:"Palmanova strandsonen",note:"Beach-restaurant med cocktails.",lat:39.5149,lng:2.5325,activity:"mat"},
      {id:24,type:"restaurant",name:"Origin (roof top)",address:"Palmanova",note:"Roof top med utsikt og drinker.",lat:39.5153,lng:2.5360,activity:"mat"},
      {id:25,type:"restaurant",name:"La vista",address:"Palmanova",note:"Restaurant med utsikt over området.",lat:39.5147,lng:2.5358,activity:"mat"},
      {id:26,type:"restaurant",name:"Turtle Beach Palmanova",address:"Palmanova strandsonen",note:"Beach-restaurant og bar.",lat:39.5152,lng:2.5333,activity:"mat"},
      {id:27,type:"restaurant",name:"Il Chiringo Beach",address:"Palmanova strandsonen",note:"Chiringuito-stil ved stranden.",lat:39.5154,lng:2.5330,activity:"mat"},
      {id:28,type:"restaurant",name:"Calvia Beach House",address:"Palmanova",note:"Restaurant med utsikt mot havet.",lat:39.5145,lng:2.5338,activity:"mat"},
      {id:29,type:"restaurant",name:"Paradise Beach",address:"Palmanova strandsonen",note:"Enkel beach bar og mat.",lat:39.5156,lng:2.5331,activity:"mat"},
      {id:30,type:"restaurant",name:"Bamboo Beach Bar",address:"Palmanova strandsonen",note:"Bar og snacks ved stranden.",lat:39.5151,lng:2.5327,activity:"mat"},
      {id:31,type:"restaurant",name:"KABO Beach House",address:"Palmanova strandsonen",note:"Beach house med mat og drinker.",lat:39.5147,lng:2.5329,activity:"mat"},
      {id:32,type:"restaurant",name:"Mar Sea Club",address:"Palmanova",note:"Klubb/restaurant ved sjøen.",lat:39.5144,lng:2.5334,activity:"mat"},

      // Sportspub
      {id:101,type:"sportspub",name:"PNG Sports Bar",address:"Passeig Mar, 32, Local 2",note:"Live sport på flere skjermer.",lat:39.5152,lng:2.5376,activity:"vm"},
      {id:102,type:"sportspub",name:"O'Neill's Bar",address:"Carrer de París, 8, 9",note:"Klassisk pub med sportsendinger.",lat:39.5149,lng:2.5368,activity:"vm"},
      {id:103,type:"sportspub",name:"JJs Sports Lounge",address:"Sidegate ved Palmanova sentrum",note:"Sportslounge til kampkveld.",lat:39.5146,lng:2.5354,activity:"vm"},

      // Aktiviteter (punktene beholdes)
      {id:203,type:"aktivitet",name:"Vannsport",address:"Stranden",note:"Jet-ski utleie, båtturer, bananbåt, parasailing og andre actionpreget aktiviteter.",lat:39.5158,lng:2.5328,activity:"vannsport"},
      {id:204,type:"aktivitet",name:"Trening",address:"Promenade / studio",note:"Løp, styrke og strandtrening.",lat:39.5143,lng:2.5382,activity:"trening"},
      {id:205,type:"aktivitet",name:"Sykkelutleie",address:"Sentrumsområdet",note:"Leie sykkel for strandpromenade og korte turer.",lat:39.5147,lng:2.5370,activity:"sykkelutleie"},

      // Shopping Palmanova
      {id:301,type:"shopping",name:"Passeig Mar-butikkene",address:"Passeig Mar",note:"Suvenirer, klær, solutstyr og småbutikker langs hovedgaten.",lat:39.5155,lng:2.5368,activity:"shopping-palmanova"},
      {id:302,type:"shopping",name:"Lokale matbutikker",address:"Sidegatene Palmanova",note:"Dagligvarer, snacks og drikke til hytta/leiligheten.",lat:39.5147,lng:2.5360,activity:"shopping-palmanova"},
      {id:303,type:"shopping",name:"Luya Accesorios",address:"Palmanova",note:"Accessories, smykker og småting.",lat:39.5150,lng:2.5365,activity:"shopping-palmanova"},
      {id:304,type:"shopping",name:"Coco Beach",address:"Palmanova strandsonen",note:"Strandklær, badedrakter og souvenirs.",lat:39.5148,lng:2.5332,activity:"shopping-palmanova"},
      {id:305,type:"shopping",name:"Tabu Mall",address:"Palmanova",note:"Mindre senter med utvalg av butikker.",lat:39.5153,lng:2.5372,activity:"shopping-palmanova"},
      {id:306,type:"shopping",name:"Ibizaabi",address:"Palmanova",note:"Mote og lifestyle-butikk.",lat:39.5151,lng:2.5363,activity:"shopping-palmanova"},

      // Shopping Palma
      {id:401,type:"shopping",name:"El Corte Inglés",address:"Plaça España, Palma",note:"Stort shoppingsenter med alt fra mote til elektronikk.",lat:39.5695,lng:2.6502,activity:"shopping-palma"},
      {id:402,type:"shopping",name:"Avinguda del Rei Jaume III",address:"Palma sentrum",note:"Merketøy, sko og mote langs hovedgaten.",lat:39.5746,lng:2.6508,activity:"shopping-palma"},
      {id:403,type:"shopping",name:"Mercat de l'Olivar",address:"Palma sentrum",note:"Markedshall med mat, fisk, frukt og lokale produkter.",lat:39.5712,lng:2.6515,activity:"shopping-palma"},

      // Hotell
      {id:501,type:"hotell",name:"Suites ROC Portonova",address:"Palmanova",note:"Leilighetshotell ved sjøen.",lat:39.5153,lng:2.5339,activity:"hotell"},

      // Apotek (basert på adresser i Palmanova/Son Caliu/Mare Nostrum) [web:61][web:63][web:69]
      {id:601,type:"apotek",name:"Farmacia Antonio Miquel Ferrer",address:"Carrer Voranova, Son Caliu",note:"Apotek nær Palmanova/ Son Caliu.",lat:39.5159,lng:2.5387,activity:"apotek"},
      {id:602,type:"apotek",name:"Farmàcia Chemist Apotheke",address:"Passeig Mar 40",note:"Apotek ved strandpromenaden.",lat:39.5153,lng:2.5370,activity:"apotek"},
      {id:603,type:"apotek",name:"Lorenzo Perelló Rosselló",address:"Calle Mare Nostrum 3",note:"Apotek i Palmanova med bredt utvalg.",lat:39.5149,lng:2.5361,activity:"apotek"}
    ];

    const foodOrder = ["St. Lorenzo Tapas","L.A. American Diner","La Piazzetta","My Thai","The Blue Bar","Be Max Beach House","McDonald's"];

    const map = L.map('map').setView([39.5148, 2.5361], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const iconByType = {
      glutenfri: L.divIcon({className:'', html:'<div style="width:16px;height:16px;border-radius:50%;background:#8ef0bd;border:3px solid #fff;box-shadow:0 0 0 4px rgba(142,240,189,.18)"></div>', iconSize:[16,16], iconAnchor:[8,8]}),
      restaurant: L.divIcon({className:'', html:'<div style="width:16px;height:16px;border-radius:50%;background:#ffd166;border:3px solid #fff;box-shadow:0 0 0 4px rgba(255,209,102,.18)"></div>', iconSize:[16,16], iconAnchor:[8,8]}),
      sportspub: L.divIcon({className:'', html:'<div style="width:16px;height:16px;border-radius:50%;background:#ff8a8a;border:3px solid #fff;box-shadow:0 0 0 4px rgba(255,138,138,.18)"></div>', iconSize:[16,16], iconAnchor:[8,8]}),
      aktivitet: L.divIcon({className:'', html:'<div style="width:16px;height:16px;border-radius:50%;background:#ff8a8a;border:3px solid #fff;box-shadow:0 0 0 4px rgba(255,138,138,.18)"></div>', iconSize:[16,16], iconAnchor:[8,8]}),
      shopping: L.divIcon({className:'', html:'<div style="width:16px;height:16px;border-radius:50%;background:#4fd1ff;border:3px solid #fff;box-shadow:0 0 0 4px rgba(79,209,255,.18)"></div>', iconSize:[16,16], iconAnchor:[8,8]}),
      hotell: L.divIcon({className:'', html:'<div style="width:16px;height:16px;border-radius:50%;background:#ffffff;border:3px solid #fff;box-shadow:0 0 0 4px rgba(255,255,255,.18)"></div>', iconSize:[16,16], iconAnchor:[8,8]}),
      apotek: L.divIcon({className:'', html:'<div style="width:16px;height:16px;border-radius:50%;background:#b7c4d6;border:3px solid #fff;box-shadow:0 0 0 4px rgba(183,196,214,.18)"></div>', iconSize:[16,16], iconAnchor:[8,8]})
    };

    const markers = [];
    function addMarkers(items){
      markers.forEach(m => map.removeLayer(m));
      markers.length = 0;
      items.forEach(p => {
        const m = L.marker([p.lat, p.lng], {icon: iconByType[p.type]}).addTo(map);
        m.bindPopup(`<strong>${p.name}</strong><br>${p.address}<br>${p.note}`);
        markers.push(m);
      });
    }

    const listEl = document.getElementById('list');
    const searchEl = document.getElementById('search');
    const mainFilterButtons = [...document.querySelectorAll('#mainFilters .chip')];
    const activityFilterButtons = [...document.querySelectorAll('#activityFilters .chip')];
    let activeFilter = 'all';
    let activeActivity = '';

    function sortPlaces(arr){
      return [...arr].sort((a,b) => {
        if ((a.type === 'glutenfri' || a.type === 'restaurant') && (b.type === 'glutenfri' || b.type === 'restaurant')) {
          const ia = foodOrder.indexOf(a.name);
          const ib = foodOrder.indexOf(b.name);
          if (ia === -1 && ib === -1) return a.name.localeCompare(b.name);
          if (ia === -1) return 1;
          if (ib === -1) return -1;
          return ia - ib;
        }
        if (a.type !== b.type) return (''+a.type).localeCompare(b.type);
        return a.id - b.id;
      });
    }

    function render(){
      const q = searchEl.value.toLowerCase().trim();
      let filtered = places.filter(p => {
        const hay = `${p.name} ${p.address} ${p.note} ${p.type} ${p.activity}`.toLowerCase();
        const typeMatch =
          activeFilter === 'all' ||
          (activeFilter === 'glutenfri' && p.type === 'glutenfri') ||
          (activeFilter === 'restaurant' && p.type === 'restaurant') ||
          (activeFilter === 'sportspub' && p.type === 'sportspub') ||
          (activeFilter === 'aktivitet' && p.type === 'aktivitet') ||
          (activeFilter === 'shopping' && p.type === 'shopping') ||
          (activeFilter === 'hotell' && p.type === 'hotell') ||
          (activeFilter === 'apotek' && p.type === 'apotek');
        const activityMatch = !activeActivity || p.activity === activeActivity;
        return typeMatch && activityMatch && hay.includes(q);
      });

      filtered = sortPlaces(filtered);

      listEl.innerHTML = filtered.map(p => `
        <div class="item" data-id="${p.id}">
          <h3>${p.name}</h3>
          <div class="meta">${p.address}</div>
          <div class="meta">${p.note}</div>
          <div class="tags">
            <span class="tag ${
              p.type === 'glutenfri' ? 'gf' :
              p.type === 'restaurant' ? 'rest' :
              p.type === 'sportspub' ? 'vm' :
              p.type === 'shopping' ? 'shop' :
              p.type === 'hotell' ? 'hotel' :
              p.type === 'apotek' ? 'apotek' : 'vm'
            }">${p.type}</span>
            <span class="tag">${p.activity}</span>
          </div>
        </div>
      `).join('');

      addMarkers(filtered);

      document.querySelectorAll('.item').forEach(el => {
        el.addEventListener('click', () => {
          const p = places.find(x => x.id === Number(el.dataset.id));
          if (!p) return;
          map.setView([p.lat, p.lng], 17, {animate:true});
          const marker = markers.find(m => {
            const ll = m.getLatLng();
            return Math.abs(ll.lat - p.lat) < 0.0001 && Math.abs(ll.lng - p.lng) < 0.0001;
          });
          if (marker) marker.openPopup();
        });
      });
    }

    // Hovedfilter: kun én aktiv om gangen
    mainFilterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        mainFilterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter || 'all';
        render();
      });
    });

    // Aktivitetsfilter: toggle, men maks én aktiv
    activityFilterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const same = activeActivity === btn.dataset.activity;
        activeActivity = same ? '' : btn.dataset.activity;
        activityFilterButtons.forEach(b => b.classList.remove('active'));
        if (!same) btn.classList.add('active');
        render();
      });
    });

    searchEl.addEventListener('input', render);

    // Vær 16.–21. juli
    const weather = [
      ["16. juli","30°C / 24°C","Øst 10 km/t","UV 9","Rolig og varmt"],
      ["17. juli","31°C / 25°C","Sør 14 km/t","UV 10","Sterk sol"],
      ["18. juli","32°C / 25°C","Sørøst 11 km/t","UV 10","Bronsefinale-kveld"],
      ["19. juli","32°C / 25°C","Sørøst 13 km/t","UV 10","Finalekveld"],
      ["20. juli","31°C / 24°C","Vest 9 km/t","UV 9","Lett bris"],
      ["21. juli","30°C / 24°C","Nordøst 11 km/t","UV 9","Varm dag"]
    ];
    document.getElementById('weatherGridTop').innerHTML = weather.map(d => `
      <div class="day">
        <div class="d">${d[0]}</div>
        <div class="t">${d[1]}</div>
        <div class="t">${d[2]}</div>
        <div class="t">${d[3]}</div>
        <div class="t">${d[4]}</div>
      </div>
    `).join('');

    // Valutakalkulator (enkel, fast kurs)
    const eurInput = document.getElementById('eurInput');
    const nokOutput = document.getElementById('nokOutput');
    function updateCurrency(){
      const eur = parseFloat((eurInput.value || '').replace(',', '.'));
      if (isNaN(eur)) {
        nokOutput.textContent = "≈ 0 NOK";
        return;
      }
      const rate = 11.5; // eksempel fast kurs
      const nok = eur * rate;
      nokOutput.textContent = `≈ ${nok.toFixed(2)} NOK`;
    }
    eurInput.addEventListener('input', updateCurrency);

    render();
  </script>
</body>
</html>

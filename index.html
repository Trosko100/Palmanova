  <style>
    :root{
      --bg:#07111f;
      --bg2:#0b1730;
      --panel:rgba(10,18,34,.72);
      --panel2:rgba(10,18,34,.92);
      --line:rgba(255,255,255,.10);
      --text:#f5f8fc;
      --muted:#b7c4d6;
      --sea:#4fd1ff;
      --sand:#ffd98a;
      --green:#8ef0bd;
      --yellow:#ffcf5a;
      --red:#ff8a8a;
      --shadow:0 18px 48px rgba(0,0,0,.34);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.12), transparent 22%),
        linear-gradient(180deg, #08111f 0%, #0e2038 35%, #123d57 100%);
      min-height:100vh;
    }
    .hero{
      padding:16px 16px 12px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), transparent 35%),
        radial-gradient(circle at 15% 18%, rgba(255,220,120,.16), transparent 16%),
        radial-gradient(circle at 88% 20%, rgba(79,209,255,.12), transparent 18%);
    }
    .hero-inner{
      max-width:1200px;
      margin:0 auto;
    }
    h1{
      margin:0;
      font-size:clamp(1.35rem,4.8vw,2.2rem);
      line-height:1.05;
      letter-spacing:-.03em;
    }
    .subtitle{
      margin:8px 0 0;
      max-width:720px;
      color:rgba(255,255,255,.85);
      line-height:1.5;
      font-size:.92rem;
    }

    /* Weather right under title */
    .weather-top{
      margin-top:12px;
      padding:10px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
    }
    .weather-top h2{
      margin:0 0 8px;
      font-size:.98rem;
    }
    .weather-grid-top{
      display:grid;
      grid-template-columns:repeat(6, minmax(86px, 1fr));
      gap:8px;
      overflow:auto;
      padding-bottom:2px;
    }
    .day{
      min-width:86px;
      border-radius:14px;
      padding:9px;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.09);
    }
    .day .d{font-weight:800; margin-bottom:6px; font-size:.9rem}
    .day .t{color:var(--muted); font-size:.8rem; line-height:1.35}

    /* Layout mobile-first */
    .layout{
      max-width:1200px;
      margin:0 auto;
      padding:12px;
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      align-items:start;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      backdrop-filter: blur(14px);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .sidebar{
      padding:10px;
    }
    .section-title{
      margin:4px 0 8px;
      font-size:1rem;
      letter-spacing:-.02em;
    }
    .filters{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:8px;
    }
    .chip{
      cursor:pointer;
      border:none;
      color:var(--text);
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      padding:8px 10px;
      border-radius:999px;
      font-weight:700;
      font-size:.82rem;
      transition:.15s transform, .15s background, .15s border-color;
    }
    .chip:hover{transform:translateY(-1px)}
    .chip.active{background:rgba(79,209,255,.20); border-color:rgba(79,209,255,.40)}
    .search{
      width:100%;
      margin:0 0 8px;
      padding:11px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.20);
      color:var(--text);
      outline:none;
      font-size:.95rem;
    }
    .search::placeholder{color:#8fa3bb}
    .list{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:55vh;
      overflow:auto;
      padding-right:3px;
    }
    .item{
      background:var(--panel2);
      border:1px solid rgba(255,255,255,.09);
      border-radius:16px;
      padding:11px;
      cursor:pointer;
      transition:.15s transform, .15s border-color;
    }
    .item:hover{transform:translateY(-1px); border-color:rgba(255,255,255,.18)}
    .item h3{margin:0 0 5px; font-size:.95rem}
    .meta{color:var(--muted); font-size:.84rem; line-height:1.4}
    .tags{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px}
    .tag{
      display:inline-block;
      padding:3px 8px;
      border-radius:999px;
      font-size:.72rem;
      font-weight:700;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
    }
    .tag.gf{background:rgba(142,240,189,.14)}
    .tag.act{background:rgba(255,209,102,.14)}
    .tag.vm{background:rgba(255,138,138,.14)}
    .tag.shop{background:rgba(79,209,255,.14)}
    .map-wrap{padding:10px}
    #map{
      width:100%;
      height:55vh;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.1);
    }
    .footer-note{
      margin-top:10px;
      color:var(--muted);
      font-size:.8rem;
      line-height:1.4;
    }
    @media (min-width: 900px){
      .layout{
        grid-template-columns:380px 1fr;
      }
      .sidebar{
        position:sticky;
        top:12px;
      }
      .hero-inner{
        display:grid;
        grid-template-columns:1.1fr .9fr;
        gap:16px;
        align-items:end;
      }
      #map{
        height:620px;
      }
      .list{
        max-height:620px;
      }
    }
  </style>
</head>

    <section class="panel map-wrap">

  </main>

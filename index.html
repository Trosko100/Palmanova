<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Bekkeblomveien i Palmanova</title>
  <meta name="description" content="Mobiltilpasset reiseapp med liste over glutenfri mat, restauranter, sportspuber, aktiviteter, shopping, hotell og apotek i Palmanova." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#07111f;
      --panel:rgba(10,18,34,.82);
      --panel2:rgba(10,18,34,.94);
      --line:rgba(255,255,255,.12);
      --text:#f5f8fc;
      --muted:#b7c4d6;
      --accent:#4fd1ff;
      --accent2:#ffd166;
      --shadow:0 18px 48px rgba(0,0,0,.34);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,.12), transparent 22%),
        linear-gradient(180deg, #08111f 0%, #0e2038 35%, #123d57 100%);
      min-height:100vh;
    }
    .hero{
      padding:12px 12px 10px;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), transparent 35%),
        radial-gradient(circle at 15% 18%, rgba(255,220,120,.16), transparent 16%),
        radial-gradient(circle at 88% 20%, rgba(79,209,255,.12), transparent 18%);
    }
    .hero-inner{
      max-width:1200px;
      margin:0 auto;
    }
    .hero-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    h1{
      margin:0;
      font-size:clamp(1.35rem,4.2vw,2.0rem);
      line-height:1.05;
      letter-spacing:-.03em;
      white-space:nowrap;
    }
    .reise-btn{
      border:none;
      border-radius:999px;
      padding:8px 14px;
      background:rgba(79,209,255,.25);
      border:1px solid rgba(79,209,255,.55);
      color:var(--text);
      font-weight:700;
      font-size:.85rem;
      cursor:pointer;
      backdrop-filter: blur(12px);
    }
    .reise-btn:hover{background:rgba(79,209,255,.35)}
    .top-bar{
      margin-top:8px;
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .currency-box{
      flex:1;
      min-width:0;
      display:flex;
      align-items:center;
      gap:6px;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.10);
    }
    .currency-box label{
      font-size:.8rem;
      color:var(--muted);
      white-space:nowrap;
    }
    .currency-input{
      flex:0 0 70px;
      padding:6px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.45);
      color:var(--text);
      font-size:.8rem;
      outline:none;
    }
    .currency-output{
      font-size:.8rem;
      color:#e5f9ff;
      white-space:nowrap;
    }
    .emergency{
      flex:0 0 auto;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      font-size:.8rem;
      color:var(--muted);
      white-space:nowrap;
    }
    .emergency strong{color:#ffd166}

    .weather-top{
      margin-top:10px;
      padding:10px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
    }
    .weather-top h2{
      margin:0 0 8px;
      font-size:.98rem;
    }
    .weather-grid-top{
      display:grid;
      grid-template-columns:repeat(6, minmax(86px, 1fr));
      gap:8px;
      overflow:auto;
      padding-bottom:2px;
    }
    .day{
      min-width:86px;
      border-radius:14px;
      padding:9px;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.09);
    }
    .day .d{font-weight:800; margin-bottom:6px; font-size:.9rem}
    .day .t{color:var(--muted); font-size:.8rem; line-height:1.35}

    .layout{
      max-width:1200px;
      margin:0 auto;
      padding:12px;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      backdrop-filter: blur(14px);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .sidebar{
      padding:10px;
    }
    .section-title{
      margin:4px 0 8px;
      font-size:1rem;
      letter-spacing:-.02em;
    }
    .filters{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:8px;
    }
    .chip{
      cursor:pointer;
      border:none;
      color:var(--text);
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      padding:8px 10px;
      border-radius:999px;
      font-weight:700;
      font-size:.82rem;
      transition:.15s transform, .15s background, .15s border-color;
    }
    .chip:hover{transform:translateY(-1px)}
    .chip.active{background:rgba(79,209,255,.20); border-color:rgba(79,209,255,.40)}
    .search{
      width:100%;
      margin:0 0 8px;
      padding:11px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,020);
      color:var(--text);
      outline:none;
      font-size:.95rem;
    }
    .search::placeholder{color:#8fa3bb}
    .list{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:70vh;
      overflow:auto;
      padding-right:3px;
    }
    .item{
      background:var(--panel2);
      border:1px solid rgba(255,255,255,.09);
      border-radius:16px;
      padding:12px;
      transition:.15s transform, .15s border-color;
    }
    .item:hover{transform:translateY(-1px); border-color:rgba(255,255,255,.18)}
    .item h3{margin:0 0 5px; font-size:.98rem}
    .meta{color:var(--muted); font-size:.84rem; line-height:1.4}
    .tags{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; align-items:center}
    .tag{
      display:inline-block;
      padding:3px 8px;
      border-radius:999px;
      font-size:.72rem;
      font-weight:700;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
    }
    .tag.gf{background:rgba(142,240,189,.14)}
    .tag.rest{background:rgba(255,209,102,.14)}
    .tag.vm{background:rgba(255,138,138,.14)}
    .tag.shop{background:rgba(79,209,255,.14)}
    .tag.hotel{background:rgba(255,255,255,.10)}
    .tag.apotek{background:rgba(255,255,255,.14)}
    .maps-btn{
      margin-left:auto;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(79,209,255,.15);
      border:1px solid rgba(79,209,255,.40);
      color:var(--text);
      font-size:.78rem;
      font-weight:700;
      text-decoration:none;
      white-space:nowrap;
    }
    .maps-btn:hover{background:rgba(79,209,255,.25)}
    @media (max-width: 480px){
      .item{
        display:flex;
        flex-wrap:wrap;
        gap:8px;
      }
      .item h3{
        flex:1 1 100%;
      }
      .item .meta{
        flex:1 1 100%;
      }
      .tags{
        flex: 1 1 auto;
      }
      .maps-btn{
        margin-left: auto;
      }
    }
    .footer-note{
      margin-top:10px;
      color:var(--muted);
      font-size:.8rem;
      line-height:1.4;
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-row">
        <h1>Bekkeblomveien i Palmanova</h1>
        <button class="reise-btn" onclick="window.location.href='reise.html'">Reise</button>
      </div>

      <div class="top-bar">
        <div class="currency-box">
          <label for="eurInput">Valuta: EUR → NOK</label>
          <input id="eurInput" class="currency-input" type="number" inputmode="decimal" placeholder="EUR" />
          <div class="currency-output" id="nokOutput">≈ 0 NOK</div>
        </div>
        <div class="emergency">
          <strong>Nød (+34):</strong> Brann 080 – Lege 061 – Politi 112
        </div>
      </div>

      <div class="weather-top">
        <h2>Værmelding 16.–21. juli</h2>
        <div class="weather-grid-top" id="weatherGridTop"></div>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="panel sidebar">
      <h2 class="section-title">Filtrer innhold</h2>

      <div class="filters" id="mainFilters">
        <button class="chip active" data-filter="all">Alle</button>
        <button class="chip" data-filter="glutenfri">Glutenfri</button>
        <button class="chip" data-filter="restaurant">Restauranter</button>
        <button class="chip" data-filter="sportspub">Sportspuber</button>
        <button class="chip" data-filter="aktivitet">Aktiviteter</button>
        <button class="chip" data-filter="shopping">Shopping</button>
        <button class="chip" data-filter="hotell">Hotell</button>
        <button class="chip" data-filter="apotek">Apotek</button>
      </div>

      <input id="search" class="search" type="search" placeholder="Søk navn, gate eller aktivitet..." />

      <div class="list" id="list"></div>

      <div class="footer-note">
        Trykk på "Åpne i Google Maps" for å få presise koordinater og veibeskrivelse.
      </div>
    </section>
  </main>

  <script>
    // Steder med navn og adresse for Google Maps-søk
    const places = [
      // Glutenfri
      {id:1,type:"glutenfri",name:"St. Lorenzo Tapas",address:"Cala Blanca 1, Son Matias, Palmanova",note:"100% glutenfri profil.",activity:"mat"},
      {id:2,type:"glutenfri",name:"L.A. American Diner",address:"Passeig Mar 18, Palmanova",note:"Godt kjent for glutenfrie valg.",activity:"mat"},
      {id:3,type:"glutenfri",name:"La Piazzetta",address:"Passeig Mar 10, Palmanova",note:"Glutenfrie alternativer.",activity:"mat"},
      {id:4,type:"glutenfri",name:"My Thai",address:"Passeig Mar 12, Palmanova",note:"Glutenfrie valg i menyen.",activity:"mat"},
      {id:5,type:"glutenfri",name:"The Blue Bar",address:"Palmanova strandsonen",note:"Glutenfri mat, brød og pasta.",activity:"mat"},
      {id:6,type:"glutenfri",name:"Be Max Beach House",address:"Carrer Cala Blanca, Palmanova",note:"Strandnær restaurant med GF-alternativer.",activity:"mat"},
      {id:7,type:"glutenfri",name:"McDonald's",address:"Palmanova",note:"Kjeden med standardisert meny.",activity:"mat"},

      // Restauranter
      {id:20,type:"restaurant",name:"Olive Tree",address:"Carrer Cala Blanca 1, Palmanova",note:"Middelhavsinspirert meny.",activity:"mat"},
      {id:21,type:"restaurant",name:"Iroko",address:"Carrer Duc Estremera 3, Palmanova",note:"Fusion og grill.",activity:"mat"},
      {id:22,type:"restaurant",name:"Max Garden",address:"Carrer de París 2, Palmanova",note:"Moderne restaurant.",activity:"mat"},
      {id:23,type:"restaurant",name:"Siso Beach",address:"Palmanova strandsonen",note:"Beach-restaurant med cocktails.",activity:"mat"},
      {id:24,type:"restaurant",name:"Origin (roof top)",address:"Palmanova",note:"Roof top med utsikt.",activity:"mat"},
      {id:25,type:"restaurant",name:"La vista",address:"Palmanova",note:"Restaurant med utsikt.",activity:"mat"},
      {id:26,type:"restaurant",name:"Turtle Beach Palmanova",address:"Palmanova strandsonen",note:"Beach-restaurant og bar.",activity:"mat"},
      {id:27,type:"restaurant",name:"Il Chiringo Beach",address:"Calle del Mar 19, Palmanova",note:"Chiringuito på stranden.",activity:"mat"},
      {id:28,type:"restaurant",name:"Calvia Beach House",address:"Palmanova strandsonen",note:"Restaurant med utsikt mot havet.",activity:"mat"},
      {id:29,type:"restaurant",name:"Paradise Beach",address:"Palmanova strandsonen",note:"Enkel beach bar og mat.",activity:"mat"},
      {id:30,type:"restaurant",name:"Bamboo Beach Bar",address:"Palmanova strandsonen",note:"Bar og snacks ved stranden.",activity:"mat"},
      {id:31,type:"restaurant",name:"KABO Beach House",address:"Palmanova strandsonen",note:"Beach house med mat og drinker.",activity:"mat"},
      {id:32,type:"restaurant",name:"Mar Sea Club",address:"Palmanova strandsonen",note:"Klubb/restaurant ved sjøen.",activity:"mat"},

      // Sportspub
      {id:101,type:"sportspub",name:"PNG Sports Bar",address:"Passeig Mar 32, Local 2, Palmanova",note:"Live sport på flere skjermer.",activity:"vm"},
      {id:102,type:"sportspub",name:"O'Neill's Bar",address:"Carrer de París 8, Palmanova",note:"Klassisk pub med sportsendinger.",activity:"vm"},
      {id:103,type:"sportspub",name:"JJs Sports Lounge",address:"Palmanova sentrum",note:"Sportslounge til kampkveld.",activity:"vm"},

      // Aktiviteter
      {id:203,type:"aktivitet",name:"Vannsport",address:"Palmanova stranden",note:"Jet-ski, båtturer, bananbåt, parasailing.",activity:"vannsport"},
      {id:204,type:"aktivitet",name:"Trening",address:"Palmanova Promenade",note:"Løp, styrke og strandtrening.",activity:"trening"},
      {id:205,type:"aktivitet",name:"Sykkelutleie",address:"Palmanova sentrum",note:"Leie sykkel for strandpromenade.",activity:"sykkelutleie"},

      // Shopping Palmanova
      {id:301,type:"shopping",name:"Passeig Mar-butikkene",address:"Passeig Mar, Palmanova",note:"Suvenirer, klær, solutstyr.",activity:"shopping-palmanova"},
      {id:302,type:"shopping",name:"Lokale matbutikker",address:"Palmanova sidegatene",note:"Dagligvarer, snacks og drikke.",activity:"shopping-palmanova"},
      {id:303,type:"shopping",name:"Luya Accesorios",address:"Palmanova",note:"Accessories, smykker.",activity:"shopping-palmanova"},
      {id:304,type:"shopping",name:"Coco Beach",address:"Palmanova strandsonen",note:"Strandklær og souvenirs.",activity:"shopping-palmanova"},
      {id:305,type:"shopping",name:"Tabu Mall",address:"Palmanova",note:"Mindre senter med butikker.",activity:"shopping-palmanova"},
      {id:306,type:"shopping",name:"Ibizaabi",address:"Palmanova",note:"Mote og lifestyle.",activity:"shopping-palmanova"},

      // Shopping Palma
      {id:401,type:"shopping",name:"El Corte Inglés",address:"Plaça España, Palma",note:"Stort shoppingsenter.",activity:"shopping-palma"},
      {id:402,type:"shopping",name:"Avinguda del Rei Jaume III",address:"Palma sentrum",note:"Merketøy og mote.",activity:"shopping-palma"},
      {id:403,type:"shopping",name:"Mercat de l'Olivar",address:"Palma sentrum",note:"Markedshall med mat.",activity:"shopping-palma"},

      // Hotell
      {id:501,type:"hotell",name:"Suites ROC Portonova",address:"Passeig Mar 2, Palmanova",note:"Leilighetshotell ved sjøen.",activity:"hotell"},

      // Apotek
      {id:601,type:"apotek",name:"Farmacia Antonio Miquel Ferrer",address:"Carrer Voranova, Son Caliu, Palmanova",note:"Apotek nær Palmanova.",activity:"apotek"},
      {id:602,type:"apotek",name:"Farmàcia Chemist Apotheke",address:"Passeig Mar 40, Palmanova",note:"Apotek ved strandpromenaden.",activity:"apotek"},
      {id:603,type:"apotek",name:"Lorenzo Perelló Rosselló",address:"Calle Mare Nostrum 3, Palmanova",note:"Apotek i Palmanova.",activity:"apotek"}
    ];

    const foodOrder = ["St. Lorenzo Tapas","L.A. American Diner","La Piazzetta","My Thai","The Blue Bar","Be Max Beach House","McDonald's"];

    const listEl = document.getElementById('list');
    const searchEl = document.getElementById('search');
    const mainFilterButtons = [...document.querySelectorAll('#mainFilters .chip')];
    let activeFilter = 'all';

    // Lag Google Maps søkelenke
    function googleMapsUrl(name, address){
      const query = encodeURIComponent(`${name} ${address}`);
      return `https://www.google.com/maps/search/${query}`;
    }

    function sortPlaces(arr){
      return [...arr].sort((a,b) => {
        if ((a.type === 'glutenfri' || a.type === 'restaurant') && (b.type === 'glutenfri' || b.type === 'restaurant')) {
          const ia = foodOrder.indexOf(a.name);
          const ib = foodOrder.indexOf(b.name);
          if (ia === -1 && ib === -1) return a.name.localeCompare(b.name);
          if (ia === -1) return 1;
          if (ib === -1) return -1;
          return ia - ib;
        }
        if (a.type !== b.type) return (''+a.type).localeCompare(b.type);
        return a.id - b.id;
      });
    }

    function render(){
      const q = searchEl.value.toLowerCase().trim();
      let filtered = places.filter(p => {
        const hay = `${p.name} ${p.address} ${p.note} ${p.type} ${p.activity}`.toLowerCase();
        const typeMatch =
          activeFilter === 'all' ||
          (activeFilter === 'glutenfri' && p.type === 'glutenfri') ||
          (activeFilter === 'restaurant' && p.type === 'restaurant') ||
          (activeFilter === 'sportspub' && p.type === 'sportspub') ||
          (activeFilter === 'aktivitet' && p.type === 'aktivitet') ||
          (activeFilter === 'shopping' && p.type === 'shopping') ||
          (activeFilter === 'hotell' && p.type === 'hotell') ||
          (activeFilter === 'apotek' && p.type === 'apotek');
        return typeMatch && hay.includes(q);
      });

      filtered = sortPlaces(filtered);

      listEl.innerHTML = filtered.map(p => {
        const mapsUrl = googleMapsUrl(p.name, p.address);
        return `
        <div class="item">
          <h3>${p.name}</h3>
          <div class="meta">${p.address}</div>
          <div class="meta">${p.note}</div>
          <div class="tags">
            <span class="tag ${
              p.type === 'glutenfri' ? 'gf' :
              p.type === 'restaurant' ? 'rest' :
              p.type === 'sportspub' ? 'vm' :
              p.type === 'shopping' ? 'shop' :
              p.type === 'hotell' ? 'hotel' :
              p.type === 'apotek' ? 'apotek' : 'vm'
            }">${p.type}</span>
            <span class="tag">${p.activity}</span>
            <a class="maps-btn" href="${mapsUrl}" target="_blank" rel="noopener">Åpne i Google Maps ↗</a>
          </div>
        </div>
      `}).join('');
    }

    mainFilterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        mainFilterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter || 'all';
        render();
      });
    });

    searchEl.addEventListener('input', render);

    // Vær 16.–21. juli
    const weather = [
      ["16. juli","30°C / 24°C","Øst 10 km/t","UV 9","Rolig og varmt"],
      ["17. juli","31°C / 25°C","Sør 14 km/t","UV 10","Sterk sol"],
      ["18. juli","32°C / 25°C","Sørøst 11 km/t","UV 10","Bronsefinale-kveld"],
      ["19. juli","32°C / 25°C","Sørøst 13 km/t","UV 10","Finalekveld"],
      ["20. juli","31°C / 24°C","Vest 9 km/t","UV 9","Lett bris"],
      ["21. juli","30°C / 24°C","Nordøst 11 km/t","UV 9","Varm dag"]
    ];
    document.getElementById('weatherGridTop').innerHTML = weather.map(d => `
      <div class="day">
        <div class="d">${d[0]}</div>
        <div class="t">${d[1]}</div>
        <div class="t">${d[2]}</div>
        <div class="t">${d[3]}</div>
        <div class="t">${d[4]}</div>
      </div>
    `).join('');

    // Valutakalkulator
    const eurInput = document.getElementById('eurInput');
    const nokOutput = document.getElementById('nokOutput');
    function updateCurrency(){
      const eur = parseFloat((eurInput.value || '').replace(',', '.'));
      if (isNaN(eur)) {
        nokOutput.textContent = "≈ 0 NOK";
        return;
      }
      const rate = 11.5;
      const nok = eur * rate;
      nokOutput.textContent = `≈ ${nok.toFixed(2)} NOK`;
    }
    eurInput.addEventListener('input', updateCurrency);

    render();
  </script>
</body>
</html>
